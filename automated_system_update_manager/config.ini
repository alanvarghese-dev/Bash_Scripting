# =============================================================================
# System Update Manager Configuration
# =============================================================================
# Purpose: Configure the automated system update manager
# Author: DevOps Team
# Version: 1.0.0
# =============================================================================

# =============================================================================
# UPDATE SETTINGS
# =============================================================================
# Enable distribution upgrades (kernel, libc, etc.)
# This is equivalent to running 'apt-get dist-upgrade'
# WARNING: This may upgrade packages that require dependencies
# Options: true, false
dist_upgrade = false

# Automatically remove unused packages after update
# This is equivalent to running 'apt-get autoremove'
# Options: true, false
auto_remove = true

# Clean package cache after update
# This runs 'apt-get autoclean' and 'apt-get clean'
# Options: true, false
clean_cache = true

# Maximum retries for failed apt operations
# The script will retry apt-get commands this many times
# Minimum: 1, Maximum: 10
max_retries = 3

# Timeout for apt commands (in seconds)
# Maximum time to wait for apt-get commands to complete
# Minimum: 60, Maximum: 3600
timeout = 300

# =============================================================================
# BACKUP SETTINGS
# =============================================================================
# Backup current package list before updating
# This creates a snapshot of installed packages
# Options: true, false
backup_package_list = true

# Backup .deb files from apt cache before updating
# This allows for potential package downgrade if needed
# Options: true, false
backup_apt_cache = true

# Backup directory for package lists and apt cache
# Parent directory must exist and be writable
backup_dir = /var/lib/update_manager/backups

# =============================================================================
# LOGGING SETTINGS
# =============================================================================
# Log file path
# Must be writable by root or the user running the script
log_file = /var/log/update_manager.log

# Log to syslog (via logger command)
# This integrates with system logging
# Options: true, false
use_syslog = true

# Log level verbosity
# DEBUG = Show all messages including debug
# INFO = Show informational messages and above
# WARNING = Show warnings and errors only
# ERROR = Show only error messages
# Options: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# =============================================================================
# DATABASE SETTINGS
# =============================================================================
# SQLite database path for update history
# Must be writable by root or the user running the script
db_path = /var/lib/update_manager/history.db

# =============================================================================
# ROLLBACK SETTINGS
# =============================================================================
# Generate rollback commands on update failure
# Creates shell scripts that can downgrade packages
# Options: true, false
generate_rollback = true

# Directory to store rollback scripts
# Scripts will have executable permissions
rollback_dir = /var/lib/update_manager/rollback

# =============================================================================
# NOTIFICATION SETTINGS (OPTIONAL)
# =============================================================================
# Email notifications on update completion/failure
# Requires mail utility to be installed
# Options: true, false
enable_email = false

# Email sender address
sender_address = updates@example.com

# Email recipient address
recipient_address = admin@example.com

# SMTP server (optional, uses system mailer by default)
# smtp_server = localhost

# SMTP port (optional)
# smtp_port = 25

# Slack notifications (optional)
# Requires curl to be installed
# Options: true, false
enable_slack = false

# Slack webhook URL (if enable_slack = true)
# slack_webhook = https://hooks.slack.com/services/xxx

# =============================================================================
# LOCK FILE SETTINGS
# =============================================================================
# Lock file to prevent concurrent runs
# Only one instance of the script can run at a time
lock_file = /var/lock/update_manager.lock

# =============================================================================
# ADVANCED SETTINGS
# =============================================================================
# Do NOT modify these settings unless you know what you're doing

# Package manager to use (apt, apt-get)
package_manager = apt-get

# Architecture detection (automatically detected)
# Can be overridden if needed: amd64, i386, arm64, armhf
# architecture = amd64

# Skip packages from updates (comma-separated list)
# These packages will be held back from updates
# Example: skip_packages = nginx,apache2,mysql-server
# skip_packages = 

# Hold packages during update (prevent auto-upgrade)
# Packages will need to be manually unheld to upgrade
# hold_packages = false