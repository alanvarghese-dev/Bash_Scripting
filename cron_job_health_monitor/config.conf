# Cron Job Health Monitor Configuration

# Alert Settings
ALERT_EMAIL="admin@example.com"
SLACK_WEBHOOK=""
ALERT_ON_FAILURE=true
ALERT_ON_MISSED=true

# SSH Settings for Remote Servers
SSH_USER="root"
SSH_KEY_PATH="./ssh_keys/id_rsa"
SSH_PORT_BASE=2221

# Servers List
SERVERS_FILE="./servers.txt"

# Monitoring Settings
LOG_DIR="./logs"
STATE_DIR="./state"
MAX_MINUTES_LATE=5
CHECK_INTERVAL=60

# Log retention (days)
LOG_RETENTION_DAYS=30
