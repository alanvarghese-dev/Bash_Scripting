services:
  # Web server simulation
  web1:
    image: rastasheep/ubuntu-sshd:18.04 
    container_name: ssh-web1
    ports:
      - "2221:22"
    hostname: web1

  web2:
    image: rastasheep/ubuntu-sshd:18.04 
    container_name: ssh-web2
    ports:
      - "2222:22"
    hostname: web2

  # Database server simulation
  db1:
    image: rastasheep/ubuntu-sshd:18.04 
    container_name: ssh-db1
    ports:
      - "2223:22"
    hostname: db1

  # Load balancer simulation
  lb1:
    image: rastasheep/ubuntu-sshd:18.04 
    container_name: ssh-lb1
    ports:
      - "2224:22"
    hostname: lb1
