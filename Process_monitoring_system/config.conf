# Process Monitoring System Configuration
# ========================================

# Server Configuration
MONITOR_SERVERS_FILE="${MONITOR_SERVERS_FILE:-./servers.txt}"
REMOTE_METHOD="docker"
DOCKER_SOCKET="/var/run/docker.sock"

# General Settings
MONITOR_INTERVAL=5
LOG_DIR="/var/log/process_monitor"
DATA_DIR="/var/lib/process_monitor"
PID_FILE="/var/run/process_monitor.pid"

# Process Monitoring (per container)
MONITORED_PROCESSES="nginx redis mysqld postgres mongod rabbitmq-server"
CPU_THRESHOLD=80
MEMORY_THRESHOLD=80
DISK_THRESHOLD=90

# Container Monitoring
CONTAINER_MONITORING_ENABLED=1
CONTAINER_CPU_THRESHOLD=80
CONTAINER_MEM_THRESHOLD=80

# Alert Settings
ALERT_ENABLED=1
ALERT_EMAIL="admin@example.com"
ALERT_LOG="/var/log/process_monitor/alerts.log"
ALERT_COOLDOWN=300

# Metrics Export
METRICS_ENABLED=1
METRICS_FORMAT="prometheus"
METRICS_PORT=9100
METRICS_FILE="/var/lib/process_monitor/metrics.prom"

# Dashboard Settings
DASHBOARD_ENABLED=1
DASHBOARD_PORT=8080
DASHBOARD_DIR="/var/www/html/process_monitor"
DASHBOARD_REFRESH=30

# Local Dashboard (for testing without sudo)
LOCAL_DASHBOARD_DIR="./html"

# System Monitoring
MONITOR_LOAD_AVG=1
MONITOR_DISK=1
MONITOR_NETWORK=1
MONITOR_CPU=1
MONITOR_MEMORY=1

# Logging
LOG_LEVEL="INFO"
LOG_MAX_SIZE=10485760
LOG_MAX_FILES=5

# Process Restart
AUTO_RESTART=0
RESTART_DELAY=5
MAX_RESTART_ATTEMPTS=3

# Notification Settings
SLACK_WEBHOOK=""
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# Security
ALLOW_PROCESS_KILL=0
ALLOW_SERVICE_RESTART=0
